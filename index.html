<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Propwelink | Coming Soon</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #111;
      font-family: 'Segoe UI', sans-serif;
      color: white;
      text-align: center;
    }

    h1 {
      font-size: 3em;
      margin-bottom: 0.5em;
      letter-spacing: 2px;
    }

    p {
      font-size: 1.2em;
      opacity: 0.8;
    }

    .logo {
      margin-bottom: 1em;
      font-size: 2em;
      font-weight: bold;
      text-transform: uppercase;
      background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .pulse {
      margin-top: 2em;
      width: 20px;
      height: 20px;
      background: violet;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.5); opacity: 0.5; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="logo">Propwelink</div>
  <h1>We’re Coming Soon!</h1>
  <p>Our new digital space is under construction — stay tuned for something amazing.</p>
  <div class="pulse"></div>
</body>
</html>
